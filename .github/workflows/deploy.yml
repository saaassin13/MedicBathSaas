name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]  # 👈 确保将 main 改为你的分支名
  workflow_dispatch: # 允许手动触发

# 设置 GITHUB_TOKEN 的权限，允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 避免同时运行多个部署任务
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # 根据你的包管理器调整，pnpm/yarn需额外配置
      
      - name: Install dependencies
        run: npm ci # 推荐使用 npm ci 以保证依赖安装的确定性[reference:3]
      
      - name: Build project
        run: npm run build # 👈 执行你的构建命令，生成 dist 或 build 文件夹
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 👈 将构建生成的文件夹路径改为你的，一般项目是 dist 或 build
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4